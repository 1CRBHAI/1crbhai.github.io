  display:flex;
  justify-content:center;

/* MAIN CARD */
.container{

  text-align:center;

.profile{

  box-shadow:0 0 30px #00ffcc;

.profile img{

  height:100%;
  object-fit:cover;
}

/* TITLE */
.title{

/* HIGHLIGHT TEXT */
.highlight{

}

/* SUBTEXT */
.subtext{

  font-size:15px;
  margin:15px 0 25px;
}

/* BUTTON */
.btn{
  background:#ffcc00;
  color:#000;
  padding:15px;
  width:80%;
  border:none;
  border-radius:15px;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px #ffcc00;
}

/* GLOW */
@keyframes glow{
