<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VIP Strategy Access</title>

<!-- META PIXEL -->
<script>
!function(f,b,e,v,n,t,s)
{if(f.fbq)return;n=f.fbq=function(){n.callMethod?
n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;
n.push=n;n.loaded=!0;n.version='2.0';
n.queue=[];t=b.createElement(e);t.async=!0;
t.src=v;s=b.getElementsByTagName(e)[0];

(window, document,'script','https://connect.facebook.net/en_US/fbevents.js');

fbq('init', 'YOUR_PIXEL_ID'); 
fbq('track', 'PageView');

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background: radial-gradient(circle, #001a1a, #000);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* Card */
.container{
  background:#000;
  padding:30px;
  border-radius:25px;
  text-align:center;
  width:320px;
  box-shadow:0 0 40px rgba(0,255,200,0.3);
}

/* Profile Image */
.profile{
  width:140px;
  height:140px;
  border-radius:50%;
  border:5px solid gold;
  margin:auto;
  overflow:hidden;
  box-shadow:0 0 30px #00ffcc;
}

.profile img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* Headings */
h2{
  margin-top:20px;
  font-size:22px;
}

.highlight{
  color:#ffcc00;
  font-weight:bold;
  font-size:20px;
  margin:10px 0;
}

.subtext{
  color:#ccc;
  font-size:14px;
  margin:15px 0;
}

/* Buttons */
.btn{
  display:block;
  margin:10px auto;
  padding:15px;
  width:80%;
  border:none;
  border-radius:12px;
  font-size:18px;
  cursor:pointer;
  transition:0.3s;
}

.join{
  background:#ffcc00;
  color:#000;
}

.subscribe{
  background:#00ffcc;
  color:#000;
}

.btn:hover{
  transform:scale(1.05);
}

/* Glow Animation */
@keyframes glow{
  from{box-shadow:0 0 10px #00ffcc;}
  to{box-shadow:0 0 25px #00ffcc;}
}

.profile{
  animation:glow 1.5s infinite alternate;
}
</style>

</head>

<body>

<div class="container">

  <!-- IMAGE -->
  <div class="profile">
    <img src="https://i.ibb.co/0jqHpnp/hacker.jpg" alt="profile">
  </div>

  <!-- TEXT -->
  <h2>STRATEGY PREDICTION SHOT 💥</h2>

  <div class="highlight">Recover all your Losses</div>
  <div class="highlight">Get 95% accurate Shots 🔥</div>

  <div class="subtext">
    Join my exclusive Telegram group for premium tips, updates & more excitement!
  </div>

  <!-- BUTTONS -->
  <button class="btn join" onclick="joinNow()">
    🚀 Join Now
  </button>

  <button class="btn subscribe" onclick="subscribeNow()">
    🔔 Subscribe
  </button>

</div>

<script>
// JOIN BUTTON → LEAD EVENT
function joinNow(){
  fbq('track', 'Lead');
  window.location.href = "https://t.me/yourlink";
}

// SUBSCRIBE BUTTON → SUBSCRIBE EVENT
function subscribeNow(){
  fbq('track', 'Subscribe');
  window.location.href = "https://t.me/yourlink";
}
</script>

</body>
</html>
